services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ledger
      POSTGRES_PASSWORD: ledger
      POSTGRES_DB: ledger
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # postgres runs *.sql here alphabetically on first init
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledger -d ledger"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .                      # Dockerfile: TODO
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ledger:ledger@db:5432/ledger
      PROCESSOR_URL: http://processor_mock:9000
    ports:
      - "8000:8000"

  processor_mock:
    build: ./processor_mock       # Dockerfile: TODO
    command: uvicorn main:app --host 0.0.0.0 --port 9000
    ports:
      - "9000:9000"

  # Optional — recovery + reconciliation. Reuses the app image.
  worker:
    build: .                      # Dockerfile: TODO
    command: python -m worker.main
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ledger:ledger@db:5432/ledger
      PROCESSOR_URL: http://processor_mock:9000

volumes:
  pgdata:
